<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .frm{
            width: 400px;
            margin: 100px auto;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px white,
                        0 0 20px darkgray,
                        0 0 40px aliceblue;
        }
        body::before{
            content: "";

            position: fixed;

            width: 350px;
            height: 350px;

            background: cyan;

            border-radius: 50%;

            filter: blur(120px);

            top: -120px;
            left: -90px;

            opacity: 0.5;
            z-index: -1;
        }

        body::after{
            content: "";

            position: fixed;

            width: 350px;
            height: 350px;

            background: #ff00ff;

            border-radius: 50%;

            filter: blur(120px);

            bottom: -90px;
            right: -90px;

            opacity: 0.5;

            z-index: -1;
        }
    </style>
</head>
<body class="bg-dark text-light">
    <form class="frm was-validated bg-light text-dark" method="post" action="login.html">
        <div>
            <h2 class="text-center">Register</h2>
            <div class="mb-3 mt-3">
                <label for="fname" class="form-label">First Name:</label>
                <input type="text" class="form-control" id="fname" placeholder="Enter first name" name="fname" required >
                <div class="valid-feedback">Valid.</div>
                <div class="invalid-feedback">Please fill out this field.</div>
            </div>
            <div class="mb-3">
                <label for="lname" class="form-label">Last Name:</label>
                <input type="text" class="form-control" id="lname" placeholder="Enter last name" name="lname" required >
                <div class="valid-feedback">Valid.</div>
                <div class="invalid-feedback">Please fill out this field.</div>
            </div>
            <div class="mb-3">
                <label for="address" class="form-label">Address:</label>
                <textarea id="address" class="form-control" rows="3" placeholder="Enter address" required></textarea>
                <div class="valid-feedback">Valid.</div>
                <div class="invalid-feedback">Please fill out this field.</div>
            </div>
            <div class="mb-3">
                <label for="number" class="form-label">Contact Number:</label>
                <input type="tel" class="form-control" required id="number" placeholder="Enter Mobile Number">
                <div class="valid-feedback">Valid.</div>
                <div class="invalid-feedback">Please fill out this field.</div>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email:</label>
                <input type="email" class="form-control" id="email" placeholder="Enter email" name="email">
            </div>
            <div class="mb-3">
                <label for="pwd" class="form-label">Password:</label>
                <input type="password" class="form-control" id="pwd" placeholder="Enter password" name="pswd" required>
                <div class="valid-feedback">Valid.</div>
                <div class="invalid-feedback">Please fill out this field.</div>
            </div>
            <div class="mb-3">
                <label for="pwd2" class="form-label">Confirm Password:</label>
                <input type="password" class="form-control" id="pwd2" placeholder="Confirm password" name="pswd2" required>
                <div class="valid-feedback">Valid.</div>
                <div class="invalid-feedback">Please fill out this field.</div>
            </div>
            <button type="submit" class="btn btn-outline-warning btn-lg ms-5">Register</button>
            <button type="reset" class="btn btn-dark btn-lg mx-5">Clear</button>
            <div>
                <p class="mt-3">Already a User? <a href="login.html" >Log in</a>.</p>
            </div>
        </div>
    </form>
</body>
</html>
