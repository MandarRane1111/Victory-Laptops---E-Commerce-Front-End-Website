<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .frm{
            width: 400px;
            margin: 100px auto;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px white,
                        0 0 20px darkgray,
                        0 0 40px aliceblue;
        }
        body::before{
            content: "";

            position: fixed;

            width: 350px;
            height: 350px;

            background: cyan;

            border-radius: 50%;

            filter: blur(120px);

            top: -120px;
            left: -90px;

            opacity: 0.5;
            z-index: -1;
        }

        body::after{
            content: "";

            position: fixed;

            width: 350px;
            height: 350px;

            background: #ff00ff;

            border-radius: 50%;

            filter: blur(120px);

            bottom: -90px;
            right: -90px;

            opacity: 0.5;

            z-index: -1;
        }
    </style>
</head>
<body class="bg-dark text-light">
    <form class="frm was-validated bg-light text-dark" method="post" action="../index.html">
        <div>
            <h2 class="text-center">Login</h2>
            <div class="mb-3 mt-3">
                <label for="uname" class="form-label">Username:</label>
                <input type="text" class="form-control" id="uname" placeholder="Enter Mobile number or Email" name="uname" required >
                <div class="valid-feedback">Valid.</div>
                <div class="invalid-feedback">Please fill out this field.</div>
            </div>
            <div class="mb-3">
                <label for="pwd" class="form-label">Password:</label>
                <input type="password" class="form-control" id="pwd" placeholder="Enter password" name="pswd" required>
                <div class="valid-feedback">Valid.</div>
                <div class="invalid-feedback">Please fill out this field.</div>
            </div>
            <button type="submit" class="btn btn-outline-warning btn-lg ms-5">Login</button>
            <button type="reset" class="btn btn-dark btn-lg mx-5">Clear</button>
            <div>
                <p class="mt-3">Don't have an account? <a href="register.html" >Sign up</a>.</p>
            </div>
        </div>
    </form>
</body>
</html>
